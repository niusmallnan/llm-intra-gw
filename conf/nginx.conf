# nginx.conf — LLM Intra Gateway
#
# Proxies /v1/* requests to an internal enterprise LLM API while injecting
# required authentication headers.  All sensitive configuration is supplied
# via environment variables at container start — nothing is hard-coded.

worker_processes auto;
error_log  /dev/stderr warn;
pid        /tmp/nginx.pid;

# Expose environment variables so they are visible inside Lua blocks.
env UPSTREAM_BASE_URL;
env UPSTREAM_API_KEY;
env PERSONAL_ACCESS_CODE;
env IP_WHITELIST;
env EXTRA_HEADERS;
env RESOLVER;
env STREAM;
env STRIP_REQUEST_PATH;
env TRACE;
env FAKE_OPENAI_KEY;
env UPSTREAM_MODE;

events {
    worker_connections 1024;
}

http {
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time uct=$upstream_connect_time';

    access_log /dev/stdout main buffer=16k flush=2s;

    # ------------------------------------------------------------------
    # Performance tuning
    # ------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 10m;
    client_body_buffer_size 1m;

    # Allow headers with underscores (some clients/legacy systems use them).
    # Nginx silently drops them by default (ignore_invalid_headers on).
    underscores_in_headers on;

    # Lua search path — prepend our application directory.
    lua_package_path "/app/lua/?.lua;;";

    # Shared dictionary for potential future use (rate limiting, etc.)
    lua_shared_dict gateway 10m;

    # ------------------------------------------------------------------
    # DNS resolver
    # ------------------------------------------------------------------
    # Required because we use a variable in proxy_pass for dynamic upstream.
    # Defaults to Docker's embedded DNS (127.0.0.11).
    # The entrypoint auto-detects from /etc/resolv.conf if not on a
    # user-defined bridge network, or uses an explicit RESOLVER env var.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ------------------------------------------------------------------
    # Server
    # ------------------------------------------------------------------
    server {
        listen 8080;
        server_name _;

        # ---- Health check ------------------------------------------------
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok"}\n';
        }

        # ---- Model list (curated subset of upstream models) ---------------
        location /v1/models {
            access_by_lua_block {
                local cjson = require "cjson"
                local auth = require "auth"
                local client_ip = ngx.var.remote_addr

                -- 1. IP whitelist check
                if not auth.check(client_ip) then
                    ngx.status = 403
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        error = {
                            message = "access denied by IP whitelist",
                            type = "permission_error"
                        }
                    }))
                    ngx.exit(403)
                end

                -- 2. Client key validation (FAKE_OPENAI_KEY)
                if not auth.check_client_key() then
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        error = {
                            message = "invalid or missing API key",
                            type = "authentication_error"
                        }
                    }))
                    ngx.exit(401)
                end
            }

            content_by_lua_block {
                local models = require "models"
                models.list()
            }
        }

        # ---- OpenAI-compatible API proxy ---------------------------------
        location /v1/ {
            # Resolve upstream target at runtime from environment.
            set $upstream_target "";
            set $upstream_host   "";

            # --- access phase: IP whitelist + Content-Type ---
            access_by_lua_block {
                local cjson = require "cjson"
                local auth = require "auth"

                -- 1. IP whitelist check
                local client_ip = ngx.var.remote_addr
                if not auth.check(client_ip) then
                    ngx.status = 403
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        error = {
                            message = "access denied by IP whitelist",
                            type = "permission_error"
                        }
                    }))
                    ngx.exit(403)
                end

                -- 2. Content-Type validation (only application/json allowed)
                local upstream = require "upstream"
                upstream.validate_content_type()
            }

            # --- rewrite phase: client auth + body transform + build target URL + inject headers ---
            rewrite_by_lua_block {
                local cjson = require "cjson"

                -- 1. Client key validation (FAKE_OPENAI_KEY)
                --    Must run BEFORE inject_headers, which replaces the
                --    Authorization header.  rewrite phase runs before access
                --    phase, so the IP whitelist and Content-Type checks above
                --    will only execute if this passes.
                local auth = require "auth"
                if not auth.check_client_key() then
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        error = {
                            message = "invalid or missing API key",
                            type = "authentication_error"
                        }
                    }))
                    ngx.exit(401)
                end

                local trace = require "trace"
                trace.log_original_request()

                local upstream = require "upstream"

                -- 2. Transform request body for in-house API (UPSTREAM_MODE=inhouse)
                upstream.transform_body()

                -- 3. Inject stream:true when streaming is enabled (STREAM env var)
                upstream.apply_stream()

                local target = upstream.resolve()
                if target then
                    ngx.var.upstream_target = target
                    ngx.var.upstream_host   = upstream.get_upstream_host()
                    upstream.inject_headers()
                end

                trace.log_modified_request()
            }

            # --- proxy settings ---
            proxy_pass $upstream_target;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Pass all client headers through (default on — explicit for clarity).
            proxy_pass_request_headers on;

            proxy_set_header Host            $upstream_host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            # @proxy_read_timeout@
            proxy_send_timeout    30s;

            proxy_ssl_verify off;

            proxy_buffering off;
            # @streaming_settings@

            # --- trace: log response from upstream + SSE Content-Length clearing ---
            header_filter_by_lua_block {
                local trace = require "trace"
                trace.log_response_headers()
                local rt = require "response_transform"
                rt.header_filter()
            }

            body_filter_by_lua_block {
                local rt = require "response_transform"
                local chunk = ngx.arg[1]
                local eof   = ngx.arg[2]
                rt.body_filter(chunk, eof)

                local trace = require "trace"
                trace.body_filter(ngx.arg[1], ngx.arg[2])
            }

            # --- error handling ---
            proxy_intercept_errors on;
            error_page 502 503 504 /gateway-error;
        }

        # ---- Gateway-level error response (OpenAI-compatible format) ------
        location = /gateway-error {
            internal;
            default_type application/json;
            header_filter_by_lua_block {
                local trace = require "trace"
                trace.log_response_headers()
            }
            return 502 '{"error":{"message":"upstream unavailable","type":"server_error"}}\n';
        }

        # ---- Catch-all: reject unknown paths -----------------------------
        location / {
            default_type application/json;
            return 404 '{"error":{"message":"not found","type":"invalid_request_error"}}\n';
        }
    }
}

# docker-compose.yml — local development & testing

version: "3.9"

services:
  gateway:
    build: .
    image: llm-intra-gw:dev
    container_name: llm-intra-gw
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-https://api.openai.com}
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY:-}
      PERSONAL_ACCESS_CODE: ${PERSONAL_ACCESS_CODE:-}
      IP_WHITELIST: ${IP_WHITELIST:-}
      EXTRA_HEADERS: ${EXTRA_HEADERS:-}
      RESOLVER: ${RESOLVER:-}
      GATEWAY_PORT: ${GATEWAY_PORT:-8080}
      ENABLE_STREAMING: ${ENABLE_STREAMING:-false}
      STRIP_REQUEST_PATH: ${STRIP_REQUEST_PATH:-true}
      FAKE_OPENAI_KEY: ${FAKE_OPENAI_KEY:-}
      UPSTREAM_MODE: ${UPSTREAM_MODE:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
